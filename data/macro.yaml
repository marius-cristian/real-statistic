    official_gdp_pps_index: 98.2
    source:
      url: https://ec.europa.eu/eurostat/api/dissemination/sdmx/2.1/data/nama_10_gdp/A.CP_MEUR.B1GQ.FR/?startPeriod=2024&endPeriod=2024&format=sdmx-csv
      date_retrieved: 2026-04-16
      notes: "Same pipeline as RO. Eurostat nama_10_gdp, demo_pjan, prc_ppp_ind."

  DE:
    year: 2024
    gdp_nominal_eur_millions: 4328970.0
    population: 83577140
    ppp: 1.117
    price_level_index: 111.7
    official_gdp_pps_index: 116.1
    source:
      url: https://ec.europa.eu/eurostat/api/dissemination/sdmx/2.1/data/nama_10_gdp/A.CP_MEUR.B1GQ.DE/?startPeriod=2024&endPeriod=2024&format=sdmx-csv
      date_retrieved: 2026-04-16
      notes: "Same pipeline as RO. Eurostat nama_10_gdp, demo_pjan, prc_ppp_ind."

  EU27:
    year: 2024
    gdp_nominal_eur_millions: 18019662.3
    population: 450380320
    ppp: 1.0
    price_level_index: 100.0
    official_gdp_pps_index: 100.0
    source:
      url: https://ec.europa.eu/eurostat/api/dissemination/sdmx/2.1/data/nama_10_gdp/A.CP_MEUR.B1GQ.EU27_2020/?startPeriod=2024&endPeriod=2024&format=sdmx-csv
      date_retrieved: 2026-04-16
      notes: "EU27_2020 aggregate. By construction PPP=1 and index=100 at the EU27 baseline."

